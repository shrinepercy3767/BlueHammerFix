title: Password Change Followed by Logon and Process Spawn for Same Account
id: 8c1a3b45-df29-4ea7-bac8-9f0e2a6d7c3b
status: experimental
description: |
    Detects the BlueHammer credential abuse pattern at the process level:
    a non-LSASS process changes a user's password (Event 4723/4724), then a
    LogonUserEx call succeeds for that same user (Event 4624 LogonType 2 or 4),
    followed by a new process spawned under that user's context (Event 4688)
    — all within a short time window from the same source process.

    This differs from the rapid_password_change rule by focusing on the
    process-to-logon-to-spawn chain rather than just the password change cycle.
    This pattern specifically catches the SamiChangePasswordUser pass-the-hash
    technique where an attacker changes a password using only the NTLM hash,
    logs in with the new known password, spawns a shell, then restores the
    original password.
references:
    - https://github.com/yourorg/bluehammer-analysis
date: 2026/04/07
author: Red Team
logsource:
    product: windows
    service: security
detection:
    password_changed:
        EventID:
            - 4723
            - 4724
    logon_success:
        EventID: 4624
        LogonType:
            - 2
            - 4
    process_created:
        EventID: 4688
    condition: password_changed or logon_success or process_created
    # CORRELATION: Alert when for the SAME TargetUserName, all three events
    # occur within 30 seconds AND the process creation parent is NOT
    # winlogon.exe, userinit.exe, or explorer.exe
falsepositives:
    - Automated user provisioning systems that create accounts and immediately log in
    - Some remote management tools that reset passwords and verify connectivity
level: critical
tags:
    - attack.credential_access
    - attack.t1003.002
    - attack.t1098
    - attack.execution
    - attack.t1059
---
# SIEM Implementation Notes
#
# Splunk:
#   index=wineventlog sourcetype="WinEventLog:Security"
#   (EventCode=4723 OR EventCode=4724 OR EventCode=4624 OR EventCode=4688)
#   | eval phase=case(
#       EventCode=4723 OR EventCode=4724, "password_change",
#       EventCode=4624, "logon",
#       EventCode=4688, "process_spawn")
#   | transaction TargetUserName maxspan=30s
#   | where mvcount(phase) >= 3
#   | search NOT ParentProcessName IN ("winlogon.exe","userinit.exe","explorer.exe")
#
# Elastic/KQL:
#   sequence by winlog.event_data.TargetUserName with maxspan=30s
#     [authentication where event.code : ("4723", "4724")]
#     [authentication where event.code == "4624" and winlog.event_data.LogonType : ("2","4")]
#     [process where event.code == "4688"
#       and not process.parent.name : ("winlogon.exe","userinit.exe","explorer.exe")]
#
# Microsoft Sentinel:
#   let pwd_changes = SecurityEvent | where EventID in (4723, 4724);
#   let logons = SecurityEvent | where EventID == 4624 and LogonType in (2, 4);
#   let procs = SecurityEvent | where EventID == 4688
#     and ParentProcessName !in ("winlogon.exe","userinit.exe","explorer.exe");
#   pwd_changes
#   | join kind=inner (logons) on TargetUserName
#   | where abs(datetime_diff('second', TimeGenerated, TimeGenerated1)) < 30
#   | join kind=inner (procs) on TargetUserName
#   | where abs(datetime_diff('second', TimeGenerated, TimeGenerated2)) < 30
